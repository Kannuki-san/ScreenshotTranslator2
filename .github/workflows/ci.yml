name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  syntax-smoke:
    name: syntax-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: python -m compileall app

      - name: Check shell syntax
        run: bash -n start.sh
